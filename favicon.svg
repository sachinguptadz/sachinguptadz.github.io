<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Main gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="50%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#06b6d4"/>
      <animateTransform
        attributeName="gradientTransform"
        type="rotate"
        from="0 0.5 0.5"
        to="360 0.5 0.5"
        dur="10s"
        repeatCount="indefinite"/>
    </linearGradient>

    <!-- Glossy top highlight -->
    <linearGradient id="shineGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.85)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>

    <!-- Text gradient -->
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>

    <!-- Shadow -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.28"/>
    </filter>

    <!-- Inner glow -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Moving light -->
    <linearGradient id="movingLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0.35)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>

    <clipPath id="clipCard">
      <rect x="8" y="8" width="84" height="84" rx="22"/>
    </clipPath>
  </defs>

  <!-- Base shadow -->
  <rect x="8" y="8" width="84" height="84" rx="22" fill="url(#bgGradient)" filter="url(#shadow)"/>

  <!-- 3D edge highlight -->
  <rect x="10" y="10" width="80" height="80" rx="20"
        fill="none"
        stroke="rgba(255,255,255,0.28)"
        stroke-width="1.5"/>

  <!-- Top glossy layer -->
  <path d="M16 18 Q50 4 84 18 L84 34 Q50 24 16 34 Z"
        fill="white"
        opacity="0.18"/>

  <!-- Floating shine -->
  <g clip-path="url(#clipCard)">
    <rect x="-30" y="0" width="30" height="100" fill="url(#movingLight)" opacity="0.65" transform="rotate(18 50 50)">
      <animate attributeName="x" from="-40" to="120" dur="3.6s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- SG text -->
  <text x="50" y="58"
        text-anchor="middle"
        font-size="40"
        font-weight="800"
        font-family="Poppins, Segoe UI, Arial, sans-serif"
        fill="url(#textGradient)"
        filter="url(#glow)"
        letter-spacing="-2">
    SG
    <animate attributeName="opacity" values="1;0.9;1" dur="2.4s" repeatCount="indefinite"/>
  </text>

  <!-- Small accent glow -->
  <circle cx="75" cy="24" r="5" fill="#ffffff" opacity="0.55">
    <animate attributeName="opacity" values="0.25;0.65;0.25" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="r" values="4;6;4" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
